# The main pipeline for TestBundle

resources:
  pipelines:
    data_extraction_etl:
      name: ${var.table_prefix}_extract_invoices_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      channel: preview
      serverless: true
      root_path: ../src/transformations

      # Pipeline configuration: passed as parameters to SQL (use ${key} in SQL)
      configuration:
        table_prefix: ${var.table_prefix}
        volume: ${var.volume}

      libraries:
        - glob:
            include: ../src/transformations/invoices/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
