# Databricks asset bundle for Data Extraction ETL (jobs + DLT pipelines)
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: data-extraction-etl
  uuid: 82a1b2c3-d4e5-46f7-a8b9-c0d1e2f3a4b5

include:
  - resources/*.yml
  - resources/*/*.yml

variables:
  catalog:
    description: The catalog to use
    default: data_extraction
  schema:
    description: The schema to use
    default: data_extraction
  table_prefix:
    description: Prefix for generated Delta table names (e.g. app -> app_invoices_parsed)
    default: app
  volume:
    description: The volume to use for uploading files
    default: /Volumes/data_extraction/default/documents
  knowledge_assistant_id:
    description: Knowledge Assistant id for syncing sources after extraction (used by update_knowledge_assistant notebook)
    default: "c04ad5d0-312c-4465-964f-98fc55679c3c"

targets:
  dev:
    mode: development
    default: true
    # workspace:
    #  host: https://e2-demo-field-eng.cloud.databricks.com
