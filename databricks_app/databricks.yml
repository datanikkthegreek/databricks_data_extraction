# Databricks asset bundle for Data Extraction App
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
#
# App source vs bundle deploy:
# - `databricks bundle deploy` syncs files to `${workspace.file_path}` (default: .../.bundle/<bundle.name>/<target>/files/)
#   including `.build/`, and creates/updates the App resource. It does not push that tree onto app compute by itself.
# - The UI may show: wait for compute to be ready (often 2–3 minutes) before deploying source — that is expected.
# - After compute is ready, either:
#     databricks bundle run data-extraction-app7 -t dev
#   or (equivalent to what worked for you; app `name` must match `resources.apps.*.name`):
#     databricks apps deploy data-extraction-app7 --source-code-path "${workspace.file_path}/.build"
#   At the shell, `${workspace.file_path}` is not expanded — use the real path from the workspace file browser, e.g.
#   /Workspace/Users/<you>/.bundle/data-extraction-app7/dev/files/.build
#   Important: the middle folder must match this file's `bundle.name` (do not reuse an old .../app5/... path).
# See: https://docs.databricks.com/aws/en/dev-tools/bundles/apps-tutorial
bundle:
  name: data-extraction-app8

# Declare variables before `include:` so `${var.*}` inside included YAML resolves during bundle processing.
variables:
  documents_volume_uc_name:
    description: UC full name of the documents volume for app uploads (WRITE_VOLUME for the app's service principal)
    default: nikks_fevm_workspace_7405607030687545.test1.documents
  sql_warehouse_id:
    description: SQL warehouse ID for app query access
    default: "4615730c28d25332"
  agent_serving_endpoint_name:
    description: Model serving / agent endpoint name
    default: "mas-7dfd5937-endpoint"
  processed_table_uc_name:
    description: UC full name of the processed manuals table for AI/SQL queries
    default: nikks_fevm_workspace_7405607030687545.test1.extract_7_productmanuals_processed
  processing_job_id:
    description: Job ID for PDF processing (run now)
    default: "723284732123840"
  databricks_host:
    description: Workspace URL (DATABRICKS_HOST); override per target if needed
    default: "https://adb-7405607030687545.5.azuredatabricks.net"

# App definition + config.env (${var.*} expanded at deploy). Same app key must not appear twice in the bundle.
include:
  - resources/bundle_app.yml

artifacts:
  app:
    build: uv run apx build

# APX writes `.build/.gitignore` with `*` so `git check-ignore` skips the whole tree; bundle sync
# respects those rules unless we explicitly include the build output (see libs/git in databricks/cli).
sync:
  include:
    - ".build/**"

targets:
  dev:
    mode: development
    default: true
