# The main pipeline for TestBundle

resources:
  pipelines:
    data_extraction_etl:
      name: data_extraction_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      channel: preview
      serverless: true
      root_path: "../src/DataExtractionETL"

      # Pipeline configuration: passed as parameters to SQL (use ${key} in SQL)
      configuration:
        table: ${var.table}
        volume: ${var.volume}

      libraries:
        - glob:
            include: ../src/DataExtractionETL/transformations/invoices/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
